<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec008c" />
      <stop offset="100%" stop-color="#fc6767" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff87" />
      <stop offset="100%" stop-color="#60efff" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Rich CSS Animations -->
    <style>
      .grid-line { stroke: #21262d; stroke-width: 0.5; }
      .axis-line { stroke: #30363d; stroke-dasharray: 4,4; }
      
      /* Floating keyframes */
      @keyframes float-top {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0px); }
      }
      @keyframes float-mid {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }
      @keyframes float-bot {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
        100% { transform: translateY(0px); }
      }
      
      /* Rotation keyframes */
      @keyframes cube-rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes orbit-rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      
      /* Radar pulse */
      @keyframes radar-pulse {
        0% { opacity: 0.2; r: 25px; }
        50% { opacity: 0.8; r: 45px; }
        100% { opacity: 0.2; r: 25px; }
      }
      
      /* Data laser flow */
      @keyframes laser-flow {
        to { stroke-dashoffset: -40; }
      }

      .layer-top {
        animation: float-top 6s ease-in-out infinite;
        transform-origin: 400px 100px;
      }
      .layer-mid {
        animation: float-mid 5s ease-in-out infinite;
        transform-origin: 400px 190px;
      }
      .layer-bot {
        animation: float-bot 4s ease-in-out infinite;
        transform-origin: 400px 280px;
      }
      
      .rotating-cube {
        animation: cube-rotation 12s linear infinite;
        transform-origin: 400px 190px;
      }
      .orbit-path {
        animation: orbit-rotation 16s linear infinite;
        transform-origin: 400px 100px;
      }
      
      .radar-pulse-ring {
        animation: radar-pulse 3s ease-in-out infinite;
        transform-origin: 400px 280px;
      }
      
      .laser-stream {
        stroke-dasharray: 8, 12;
        animation: laser-flow 2s linear infinite;
      }
      
      .interactive-node {
        transition: all 0.3s ease;
      }
      .interactive-node:hover {
        fill: #ffffff;
        filter: brightness(1.3);
      }
    </style>
  </defs>

  <!-- Dark Mode Background Frame -->
  <rect width="100%" height="100%" fill="#0d1117" rx="16" stroke="#30363d" stroke-width="1" />

  <!-- Perspective Grid -->
  <g opacity="0.3">
    <line class="grid-line" x1="100" y1="350" x2="700" y2="50" />
    <line class="grid-line" x1="150" y1="350" x2="750" y2="50" />
    <line class="grid-line" x1="50" y1="350" x2="650" y2="50" />
    <line class="grid-line" x1="200" y1="350" x2="800" y2="50" />
    
    <line class="grid-line" x1="100" y1="50" x2="700" y2="350" />
    <line class="grid-line" x1="150" y1="50" x2="750" y2="350" />
    <line class="grid-line" x1="50" y1="50" x2="650" y2="350" />
    <line class="grid-line" x1="200" y1="50" x2="800" y2="350" />
    
    <line class="axis-line" x1="400" y1="20" x2="400" y2="360" />
  </g>

  <!-- Central Laser trunk line -->
  <g>
    <line x1="400" y1="90" x2="400" y2="280" stroke="#1f2937" stroke-width="2" />
    <!-- Glowing Laser Data Flow -->
    <path class="laser-stream" d="M 280,260 L 400,280 L 520,260 L 400,190 Z" fill="none" stroke="#00ff87" stroke-width="1.5" />
    <path class="laser-stream" d="M 400,280 L 400,190 L 400,100" fill="none" stroke="#00f2fe" stroke-width="2" />
  </g>

  <!-- LAYER 3: BOTTOM (AI & Spatial PostGIS Data Mesh) -->
  <g class="layer-bot">
    <!-- Isometric Base Plate -->
    <polygon points="400,250 560,280 400,310 240,280" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <polygon points="400,260 520,280 400,300 280,280" fill="none" stroke="url(#green-grad)" stroke-width="1" opacity="0.6" />
    
    <!-- Pulsing Radar ring -->
    <ellipse cx="400" cy="280" rx="40" ry="10" fill="none" stroke="#00ff87" stroke-width="1.5" filter="url(#glow-green)">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="400" cy="280" rx="80" ry="20" fill="none" stroke="#00ff87" stroke-width="0.5" opacity="0.3" />

    <!-- Spatial Node Points -->
    <circle class="interactive-node" cx="280" cy="280" r="4.5" fill="#00ff87" filter="url(#glow-green)" />
    <text x="245" y="298" fill="#8b949e" font-family="monospace" font-size="10">PostGIS</text>
    
    <circle class="interactive-node" cx="520" cy="280" r="4.5" fill="#00ff87" filter="url(#glow-green)" />
    <text x="495" y="298" fill="#8b949e" font-family="monospace" font-size="10">UTM SIRGAS</text>

    <circle class="interactive-node" cx="400" cy="300" r="5.5" fill="#00ff87" filter="url(#glow-green)" />
    <text x="375" y="318" fill="#00ff87" font-family="monospace" font-size="10" font-weight="bold">AI Engine</text>
  </g>

  <!-- LAYER 2: MIDDLE (Unity 3D / WebGL Graphic Compilers) -->
  <g class="layer-mid">
    <!-- Isometric Base Plate -->
    <polygon points="400,160 560,190 400,220 240,190" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    
    <!-- Glowing Laser Cross -->
    <line x1="280" y1="190" x2="520" y2="190" stroke="url(#neon-grad)" stroke-width="1.5" opacity="0.5" />

    <!-- Rotating Wireframe Cube in Isometric Space -->
    <g class="rotating-cube">
      <!-- Transform helper to position and skew for isometric rotation -->
      <g transform="translate(400,190) scale(1.2, 0.6) rotate(45)">
        <polygon points="-16,-16 16,-16 16,16 -16,16" fill="none" stroke="url(#neon-grad)" stroke-width="1.5" filter="url(#glow-purple)" />
        <polygon points="-10,-10 10,-10 10,10 -10,10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6" />
      </g>
    </g>
    
    <!-- Graphic Nodes -->
    <circle class="interactive-node" cx="280" cy="190" r="4.5" fill="#ec008c" filter="url(#glow-purple)" />
    <text x="245" y="208" fill="#8b949e" font-family="monospace" font-size="10">Shader Graph</text>

    <circle class="interactive-node" cx="520" cy="190" r="4.5" fill="#fc6767" filter="url(#glow-purple)" />
    <text x="495" y="208" fill="#8b949e" font-family="monospace" font-size="10">WebGL / 3D</text>

    <circle class="interactive-node" cx="400" cy="170" r="5.5" fill="#ec008c" filter="url(#glow-purple)" />
    <text x="365" y="152" fill="#fc6767" font-family="monospace" font-size="10" font-weight="bold">Unity Engine</text>
  </g>

  <!-- LAYER 1: TOP (Web3 & Secure Cryptography Core) -->
  <g class="layer-top">
    <!-- Isometric Base Plate -->
    <polygon points="400,70 560,100 400,130 240,100" fill="#161b22" stroke="#4facfe" stroke-width="1.5" />
    
    <!-- Central Cryptography Hexagon -->
    <polygon points="400,85 423,94 425,114 400,123 377,114 375,94" fill="url(#cyan-grad)" opacity="0.85" filter="url(#glow-cyan)" />
    
    <!-- Orbiting Satellite Security Paths -->
    <g class="orbit-path">
      <ellipse cx="400" cy="100" rx="60" ry="15" fill="none" stroke="#00f2fe" stroke-width="1" stroke-dasharray="6,15" opacity="0.7" />
      <!-- Inline satellite node directly in the orbit group so it rotates around center -->
      <circle cx="340" cy="100" r="4" fill="#00f2fe" filter="url(#glow-cyan)" />
      <circle cx="460" cy="100" r="4" fill="#00f2fe" filter="url(#glow-cyan)" />
    </g>

    <!-- Satellite details (Fixed relative labels) -->
    <text x="285" y="118" fill="#8b949e" font-family="monospace" font-size="10">Argon2id KDF</text>
    <text x="440" y="118" fill="#8b949e" font-family="monospace" font-size="10">AES-256-GCM</text>

    <circle class="interactive-node" cx="400" cy="100" r="6" fill="#ffffff" filter="url(#glow-cyan)" />
    <text x="365" y="60" fill="#00f2fe" font-family="monospace" font-size="10" font-weight="bold">B2 Cryptography</text>
  </g>
</svg>
