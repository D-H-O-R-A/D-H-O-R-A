<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%">
  <defs>
    <!-- Ultra-Premium Dark/Neon Color System -->
    <linearGradient id="cyber-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neon-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f857a6" />
      <stop offset="100%" stop-color="#ff5858" />
    </linearGradient>
    <linearGradient id="matrix-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff87" />
      <stop offset="100%" stop-color="#60efff" />
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365" />
      <stop offset="100%" stop-color="#fda085" />
    </linearGradient>
    
    <!-- Professional Glow Filters for High-End Screens -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-pink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-gold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Optimized 60FPS CSS Keyframe Animations -->
    <style>
      .grid-lines { stroke: #111827; stroke-width: 0.5; }
      .isometric-axis { stroke: #1f2937; stroke-dasharray: 4,6; stroke-width: 1; }
      .text-tag { font-family: 'Courier New', monospace; font-size: 9px; font-weight: bold; fill: #4b5563; }
      .text-value { font-family: 'Courier New', monospace; font-size: 8px; fill: #374151; }
      
      /* Smooth Floating Mechanics representing layered architectures */
      @keyframes float-l1 {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0px); }
      }
      @keyframes float-l2 {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }
      @keyframes float-l3 {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
        100% { transform: translateY(0px); }
      }
      
      /* Rotations */
      @keyframes spin-clockwise {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes spin-counter {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      
      /* Pulsing Radar / GIS Scanner */
      @keyframes pulse-opacity {
        0% { opacity: 0.2; transform: scale(0.95); }
        50% { opacity: 0.8; transform: scale(1.05); }
        100% { opacity: 0.2; transform: scale(0.95); }
      }
      
      /* Linear Flow representation along network edges */
      @keyframes network-flow {
        to { stroke-dashoffset: -40; }
      }

      .layer-top {
        animation: float-l1 6s ease-in-out infinite;
        transform-origin: 400px 100px;
      }
      .layer-mid {
        animation: float-l2 5s ease-in-out infinite;
        transform-origin: 400px 210px;
      }
      .layer-bot {
        animation: float-l3 4s ease-in-out infinite;
        transform-origin: 400px 320px;
      }
      
      .rotating-core {
        animation: spin-clockwise 15s linear infinite;
        transform-origin: 400px 105px;
      }
      .rotating-ring-outer {
        animation: spin-counter 20s linear infinite;
        transform-origin: 400px 105px;
      }
      .rotating-camera {
        animation: spin-clockwise 16s linear infinite;
        transform-origin: 400px 210px;
      }
      
      .pulse-radar {
        animation: pulse-opacity 3s ease-in-out infinite;
        transform-origin: 400px 315px;
      }
      .active-stream {
        stroke-dasharray: 8, 12;
        animation: network-flow 2s linear infinite;
      }
    </style>
  </defs>

  <!-- Deep Low-Contrast Premium Background Frame -->
  <rect width="100%" height="100%" fill="#030712" rx="16" stroke="#111827" stroke-width="1.5" />

  <!-- Technical Calibration Overlays (Zero AI indications, pure low-level computing vibe) -->
  <g opacity="0.25">
    <!-- Isometric Grid lines -->
    <line class="grid-lines" x1="50" y1="380" x2="750" y2="30" />
    <line class="grid-lines" x1="100" y1="390" x2="800" y2="40" />
    <line class="grid-lines" x1="0" y1="370" x2="700" y2="20" />
    <line class="grid-lines" x1="100" y1="30" x2="800" y2="380" />
    <line class="grid-lines" x1="50" y1="20" x2="750" y2="370" />
    <line class="grid-lines" x1="0" y1="40" x2="700" y2="390" />
    
    <!-- Coordinate Axis -->
    <line class="isometric-axis" x1="400" y1="15" x2="400" y2="405" />
    <line class="isometric-axis" x1="50" y1="210" x2="750" y2="210" stroke-width="0.5" />
    
    <!-- Specs Labels -->
    <text x="25" y="30" class="text-tag">ENGINE_STATE: OPERATIONAL</text>
    <text x="25" y="42" class="text-value">COORDS: LAT_UTM_SIRGAS2000</text>
    <text x="635" y="30" class="text-tag">SECURE_KEYS: ACTIVE</text>
    <text x="635" y="42" class="text-value">CIPHER: AES_256_GCM_HARDENED</text>
  </g>

  <!-- Central Data Trunk Connection channels (Layer Interoperability) -->
  <g opacity="0.6">
    <line x1="400" y1="70" x2="400" y2="340" stroke="#111827" stroke-width="4" />
    
    <!-- High-speed Cryptographic and Spatial data laser paths -->
    <path class="active-stream" d="M 280,290 L 400,320 L 520,290 L 400,210 Z" fill="none" stroke="url(#matrix-green)" stroke-width="1.5" />
    <path class="active-stream" d="M 400,320 L 400,210 L 400,105" fill="none" stroke="url(#cyber-cyan)" stroke-width="2" />
    <path class="active-stream" d="M 220,210 L 400,210 L 580,210" fill="none" stroke="url(#neon-pink)" stroke-width="1" />
  </g>

  <!-- ================= LAYER 3: BOTTOM (Spatial PostGIS Engine & Cartography Geodesy) ================= -->
  <g class="layer-bot">
    <!-- Isometric Base Grid Plate -->
    <polygon points="400,285 580,315 400,345 220,315" fill="#030712" stroke="#111827" stroke-width="2" />
    
    <!-- Land Contour lines (Sirgas2000 UTM terrain vectors) -->
    <polygon points="400,295 540,315 400,335 260,315" fill="none" stroke="url(#matrix-green)" stroke-width="1" opacity="0.3" />
    <polygon points="400,302 500,315 400,328 300,315" fill="none" stroke="#00ff87" stroke-width="1.2" opacity="0.5" />
    
    <!-- Central PostGIS Geodetic Radar scanner -->
    <ellipse cx="400" cy="315" rx="35" ry="10" fill="none" stroke="#00ff87" stroke-width="1.5" filter="url(#glow-green)" class="pulse-radar" />
    <ellipse cx="400" cy="315" rx="65" ry="18" fill="none" stroke="#00ff87" stroke-width="0.5" opacity="0.2" />

    <!-- Spatial Node coordinates pointers -->
    <circle cx="260" cy="315" r="4" fill="#00ff87" filter="url(#glow-green)" />
    <text x="215" y="333" class="text-tag" fill="#00ff87">PostGIS Spatial</text>
    
    <circle cx="540" cy="315" r="4" fill="#00ff87" filter="url(#glow-green)" />
    <text x="515" y="333" class="text-tag" fill="#4b5563">UTM SIRGAS2000</text>

    <!-- Geodetic Spatial Grid coordinate array -->
    <path d="M 400,325 L 360,315 L 400,305 L 440,315 Z" fill="none" stroke="#60efff" stroke-width="0.8" opacity="0.4" />
    <circle cx="360" cy="315" r="3" fill="#60efff" />
    <circle cx="440" cy="315" r="3" fill="#60efff" />
    <circle cx="400" cy="325" r="3" fill="#60efff" />
    
    <text x="350" y="348" class="text-tag" fill="#60efff">Geodetic Spatial Grid</text>
  </g>

  <!-- ================= LAYER 2: MIDDLE (WebGL Engine & Custom Shader pipelines) ================= -->
  <g class="layer-mid">
    <!-- Isometric Translucent glass panel -->
    <polygon points="400,180 580,210 400,240 220,210" fill="#030712" fill-opacity="0.85" stroke="#1f2937" stroke-width="1.5" />
    
    <!-- Calibration laser projection lines -->
    <line x1="280" y1="210" x2="520" y2="210" stroke="url(#neon-pink)" stroke-width="1" opacity="0.3" />

    <!-- WebGL Camera viewport frustum (Clockwise Rotation) -->
    <g class="rotating-camera">
      <g transform="translate(400,210)">
        <!-- Virtual Lens geometry and frustum projection -->
        <polygon points="-30,-15 30,-15 15,15 -15,15" fill="none" stroke="url(#neon-pink)" stroke-width="1.5" filter="url(#glow-pink)" opacity="0.7" />
        <line x1="-30" y1="-15" x2="-45" y2="-30" stroke="#f857a6" stroke-width="1" />
        <line x1="30" y1="-15" x2="45" y2="-30" stroke="#f857a6" stroke-width="1" />
        <line x1="15" y1="15" x2="25" y2="30" stroke="#ff5858" stroke-width="1" />
        <line x1="-15" y1="15" x2="-25" y2="30" stroke="#ff5858" stroke-width="1" />
        
        <!-- Interactive node center -->
        <circle cx="0" cy="0" r="4" fill="#ffffff" filter="url(#glow-pink)" />
      </g>
    </g>
    
    <!-- Custom Shader Graph connector node -->
    <g transform="translate(260,210)">
      <polygon points="0,-8 8,0 0,8 -8,0" fill="#f857a6" filter="url(#glow-pink)" />
      <text x="-35" y="24" class="text-tag" fill="#f857a6">Shader Pipelines</text>
    </g>

    <!-- WebGL active renderer pointer -->
    <g transform="translate(540,210)">
      <polygon points="0,-8 8,0 0,8 -8,0" fill="#ff5858" filter="url(#glow-pink)" />
      <text x="-20" y="24" class="text-tag" fill="#f857a6">Three.js / WebGL</text>
    </g>

    <!-- 3D wireframe mesh representation -->
    <g transform="translate(400,165)">
      <polygon points="-20,-10 20,-10 30,10 -30,10" fill="none" stroke="#f857a6" stroke-width="1" stroke-dasharray="2,3" />
      <polygon points="-20,-30 20,-30 30,-10 -30,-10" fill="none" stroke="#f857a6" stroke-width="1" stroke-dasharray="2,3" />
      <line x1="-30" y1="10" x2="-30" y2="-10" stroke="#f857a6" stroke-width="1" stroke-dasharray="2,3" />
      <line x1="30" y1="10" x2="30" y2="-10" stroke="#f857a6" stroke-width="1" stroke-dasharray="2,3" />
      <text x="-25" y="-38" class="text-tag" fill="#ff5858" font-size="8px">3D_SPATIAL_MESH</text>
    </g>
  </g>

  <!-- ================= LAYER 1: TOP (Multi-Chain Keychains & Cryptography Vault) ================= -->
  <g class="layer-top">
    <!-- Isometric Top Glass Panel Plate -->
    <polygon points="400,75 580,105 400,135 220,105" fill="#030712" fill-opacity="0.9" stroke="url(#cyber-cyan)" stroke-width="1.8" />
    
    <!-- Rotating Web3 orbital nodes ring (Solana & EVM blocks) -->
    <g class="rotating-ring-outer">
      <ellipse cx="400" cy="105" rx="75" ry="20" fill="none" stroke="#00f2fe" stroke-width="1" stroke-dasharray="5,15" opacity="0.5" />
      
      <!-- Multi-chain ledger vector endpoints -->
      <circle cx="325" cy="105" r="5" fill="#00f2fe" filter="url(#glow-cyan)" />
      <circle cx="475" cy="105" r="5" fill="#ffffff" filter="url(#glow-cyan)" />
    </g>

    <!-- Cryptographic Secure Vault (Premium 3D Block) -->
    <!-- Vault Face 1: Left Wall -->
    <polygon points="400,105 370,90 370,120 400,135" fill="url(#cyber-cyan)" opacity="0.85" />
    <!-- Vault Face 2: Right Wall -->
    <polygon points="400,105 430,90 430,120 400,135" fill="url(#shield-grad)" stroke="#00f2fe" stroke-width="1" />
    <!-- Vault Face 3: Roof -->
    <polygon points="400,105 430,90 400,75 370,90" fill="url(#gold-grad)" opacity="0.75" />
    
    <!-- Central Cryptographic Shield locks -->
    <polygon points="400,92 412,98 412,112 400,118 388,112 388,98" fill="none" stroke="#ffffff" stroke-width="1.2" filter="url(#glow-cyan)" />

    <!-- Technical Algorithm Labels pointing to the vault -->
    <text x="235" y="125" class="text-tag" fill="#00f2fe">Argon2id KDF</text>
    <text x="490" y="125" class="text-tag" fill="#00f2fe">AES-256-GCM</text>
    
    <!-- Secure Multi-Chain System Core Marker -->
    <text x="350" y="55" class="text-tag" fill="#ffffff" font-weight="bold">SECURE CRYPTO CORE</text>
  </g>
</svg>
