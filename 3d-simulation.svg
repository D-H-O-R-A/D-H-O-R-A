<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%">
  <defs>
    <!-- Premium Web3 & 3D Color Gradients -->
    <linearGradient id="cyber-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neon-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f857a6" />
      <stop offset="100%" stop-color="#ff5858" />
    </linearGradient>
    <linearGradient id="matrix-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff87" />
      <stop offset="100%" stop-color="#60efff" />
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365" />
      <stop offset="100%" stop-color="#fda085" />
    </linearGradient>
    
    <!-- Professional Glow Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-pink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-gold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Master CSS Keyframe Animations -->
    <style>
      .grid-lines { stroke: #1e293b; stroke-width: 0.5; }
      .isometric-axis { stroke: #334155; stroke-dasharray: 4,6; stroke-width: 1; }
      .text-tag { font-family: 'Courier New', monospace; font-size: 9px; font-weight: bold; fill: #64748b; }
      .text-value { font-family: 'Courier New', monospace; font-size: 8px; fill: #475569; }
      
      /* Staggered Vertical Floating */
      @keyframes float-l1 {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-14px); }
        100% { transform: translateY(0px); }
      }
      @keyframes float-l2 {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-9px); }
        100% { transform: translateY(0px); }
      }
      @keyframes float-l3 {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
      }
      
      /* Rotations */
      @keyframes spin-clockwise {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes spin-counter {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      
      /* Pulsing elements */
      @keyframes pulse-opacity {
        0% { opacity: 0.25; }
        50% { opacity: 0.85; }
        100% { opacity: 0.25; }
      }
      
      /* Flowing transaction network paths */
      @keyframes network-flow {
        to { stroke-dashoffset: -50; }
      }

      .layer-top {
        animation: float-l1 6s ease-in-out infinite;
        transform-origin: 400px 100px;
      }
      .layer-mid {
        animation: float-l2 5s ease-in-out infinite;
        transform-origin: 400px 210px;
      }
      .layer-bot {
        animation: float-l3 4s ease-in-out infinite;
        transform-origin: 400px 320px;
      }
      
      .rotating-core {
        animation: spin-clockwise 14s linear infinite;
        transform-origin: 400px 105px;
      }
      .rotating-ring-outer {
        animation: spin-counter 24s linear infinite;
        transform-origin: 400px 105px;
      }
      .rotating-camera {
        animation: spin-clockwise 18s linear infinite;
        transform-origin: 400px 210px;
      }
      
      .pulse-radar {
        animation: pulse-opacity 3.5s ease-in-out infinite;
      }
      .active-stream {
        stroke-dasharray: 10, 15;
        animation: network-flow 2.5s linear infinite;
      }
    </style>
  </defs>

  <!-- Premium Deep Slate Space Frame -->
  <rect width="100%" height="100%" fill="#0a0f1d" rx="16" stroke="#1e293b" stroke-width="1.5" />

  <!-- Geometric System Calibration Overlays -->
  <g opacity="0.35">
    <!-- Isometric Grid Coordinates -->
    <line class="grid-lines" x1="50" y1="380" x2="750" y2="30" />
    <line class="grid-lines" x1="100" y1="390" x2="800" y2="40" />
    <line class="grid-lines" x1="0" y1="370" x2="700" y2="20" />
    <line class="grid-lines" x1="100" y1="30" x2="800" y2="380" />
    <line class="grid-lines" x1="50" y1="20" x2="750" y2="370" />
    <line class="grid-lines" x1="0" y1="40" x2="700" y2="390" />
    
    <!-- System Axes -->
    <line class="isometric-axis" x1="400" y1="15" x2="400" y2="405" />
    <line class="isometric-axis" x1="50" y1="210" x2="750" y2="210" stroke-width="0.5" />
    
    <!-- Technical Specs Labels -->
    <text x="25" y="35" class="text-tag">SYS_CALIBRATION: ACTIVE</text>
    <text x="25" y="50" class="text-value">COORDS: X_1024 / Y_480 / Z_768</text>
    <text x="635" y="35" class="text-tag">SYS_ARCH: MULTI_CHAIN</text>
    <text x="635" y="50" class="text-value">RENDERER: WEBGL_URP_2026</text>
  </g>

  <!-- Central Data Trunk Connection Laser Channels -->
  <g opacity="0.8">
    <line x1="400" y1="80" x2="400" y2="330" stroke="#1e293b" stroke-width="3" />
    
    <!-- High-speed Cryptographic and Geospatial Data Stream (Dashoffset animated) -->
    <path class="active-stream" d="M 280,290 L 400,320 L 520,290 L 400,210 Z" fill="none" stroke="url(#matrix-green)" stroke-width="2" />
    <path class="active-stream" d="M 400,320 L 400,210 L 400,105" fill="none" stroke="url(#cyber-cyan)" stroke-width="2.5" />
    <path class="active-stream" d="M 220,210 L 400,210 L 580,210" fill="none" stroke="url(#neon-pink)" stroke-width="1.5" />
  </g>

  <!-- ================= LAYER 3: BOTTOM (AI & Spatial PostGIS Terrain Grid) ================= -->
  <g class="layer-bot">
    <!-- Isometric Metallic Base Grid Plate -->
    <polygon points="400,285 580,315 400,345 220,315" fill="#0f172a" stroke="#1e293b" stroke-width="2" />
    
    <!-- Georeferenced Land Contour lines (Representing pdf-to-maps, geodetic boundaries) -->
    <polygon points="400,295 540,315 400,335 260,315" fill="none" stroke="url(#matrix-green)" stroke-width="1" opacity="0.4" />
    <polygon points="400,302 500,315 400,328 300,315" fill="none" stroke="#00ff87" stroke-width="1.2" opacity="0.6" />
    
    <!-- Central PostGIS Radar Ring (Dilates & Pulses) -->
    <ellipse cx="400" cy="315" rx="35" ry="10" fill="none" stroke="#00ff87" stroke-width="1.5" filter="url(#glow-green)" class="pulse-radar" />
    <ellipse cx="400" cy="315" rx="65" ry="18" fill="none" stroke="#00ff87" stroke-width="0.5" opacity="0.3" />

    <!-- Spatial coordinate vector markers -->
    <circle cx="260" cy="315" r="4" fill="#00ff87" filter="url(#glow-green)" />
    <text x="215" y="333" class="text-tag" fill="#00ff87">PostGIS DB</text>
    
    <circle cx="540" cy="315" r="4" fill="#00ff87" filter="url(#glow-green)" />
    <text x="515" y="333" class="text-tag" fill="#64748b">UTM SIRGAS</text>

    <!-- Geodetic Spatial Tensor matrix nodes -->
    <path d="M 400,325 L 360,315 L 400,305 L 440,315 Z" fill="none" stroke="#60efff" stroke-width="0.8" opacity="0.5" />
    <circle cx="360" cy="315" r="3" fill="#60efff" />
    <circle cx="440" cy="315" r="3" fill="#60efff" />
    <circle cx="400" cy="325" r="3" fill="#60efff" />
    
    <text x="365" y="348" class="text-tag" fill="#60efff">Spatial Geodetic Grid</text>
  </g>

  <!-- ================= LAYER 2: MIDDLE (3D Render Pipeline & WebGL Simulation Engine) ================= -->
  <g class="layer-mid">
    <!-- Isometric Translucent Plate -->
    <polygon points="400,180 580,210 400,240 220,210" fill="#0f172a" fill-opacity="0.85" stroke="#334155" stroke-width="1.5" />
    
    <!-- Laser coordinates mapping -->
    <line x1="280" y1="210" x2="520" y2="210" stroke="url(#neon-pink)" stroke-width="1" opacity="0.4" />

    <!-- 3D Spatial camera Viewport / Frustum simulation (Rotating) -->
    <g class="rotating-camera">
      <g transform="translate(400,210)">
        <!-- Complex geometric Camera lens and View Frustum Lines -->
        <polygon points="-30,-15 30,-15 15,15 -15,15" fill="none" stroke="url(#neon-pink)" stroke-width="1.5" filter="url(#glow-pink)" opacity="0.8" />
        <line x1="-30" y1="-15" x2="-45" y2="-30" stroke="#f857a6" stroke-width="1" />
        <line x1="30" y1="-15" x2="45" y2="-30" stroke="#f857a6" stroke-width="1" />
        <line x1="15" y1="15" x2="25" y2="30" stroke="#ff5858" stroke-width="1" />
        <line x1="-15" y1="15" x2="-25" y2="30" stroke="#ff5858" stroke-width="1" />
        
        <!-- Rotating coordinate target sphere -->
        <circle cx="0" cy="0" r="4" fill="#ffffff" filter="url(#glow-pink)" />
      </g>
    </g>
    
    <!-- Floating URP Shader Node markers -->
    <g transform="translate(260,210)">
      <polygon points="0,-8 8,0 0,8 -8,0" fill="#f857a6" filter="url(#glow-pink)" />
      <text x="-35" y="24" class="text-tag" fill="#f857a6">Shader Graph</text>
    </g>

    <g transform="translate(540,210)">
      <polygon points="0,-8 8,0 0,8 -8,0" fill="#ff5858" filter="url(#glow-pink)" />
      <text x="-25" y="24" class="text-tag" fill="#f857a6">Unity WebGL</text>
    </g>

    <!-- Historical ruins georeferenced bounding box (São João Marcos digital mesh) -->
    <g transform="translate(400,165)">
      <polygon points="-20,-10 20,-10 30,10 -30,10" fill="none" stroke="#f857a6" stroke-width="1" stroke-dasharray="2,3" />
      <polygon points="-20,-30 20,-30 30,-10 -30,-10" fill="none" stroke="#f857a6" stroke-width="1" stroke-dasharray="2,3" />
      <line x1="-30" y1="10" x2="-30" y2="-10" stroke="#f857a6" stroke-width="1" stroke-dasharray="2,3" />
      <line x1="30" y1="10" x2="30" y2="-10" stroke="#f857a6" stroke-width="1" stroke-dasharray="2,3" />
      <text x="-28" y="-38" class="text-tag" fill="#ff5858" font-size="8px">3D_RUINS_MESH</text>
    </g>
  </g>

  <!-- ================= LAYER 1: TOP (Web3 Multi-Chain & Cryptography Core) ================= -->
  <g class="layer-top">
    <!-- Isometric Top Plate -->
    <polygon points="400,75 580,105 400,135 220,105" fill="#0f172a" fill-opacity="0.9" stroke="url(#cyber-cyan)" stroke-width="2" />
    
    <!-- Rotating outer orbital ring (Web3 tokens/nodes) -->
    <g class="rotating-ring-outer">
      <ellipse cx="400" cy="105" rx="75" ry="20" fill="none" stroke="#00f2fe" stroke-width="1" stroke-dasharray="5,15" opacity="0.6" />
      
      <!-- Ethereum and Solana block nodes directly inside the rotation ring -->
      <circle cx="325" cy="105" r="5" fill="#00f2fe" filter="url(#glow-cyan)" />
      <circle cx="475" cy="105" r="5" fill="#ffffff" filter="url(#glow-cyan)" />
    </g>

    <!-- Secure Cryptographic Vault (High-fidelity 3D Block representation) -->
    <!-- Front Left Face -->
    <polygon points="400,105 370,90 370,120 400,135" fill="url(#cyber-cyan)" opacity="0.9" />
    <!-- Front Right Face -->
    <polygon points="400,105 430,90 430,120 400,135" fill="url(#shield-grad)" stroke="#00f2fe" stroke-width="1" />
    <!-- Top Face -->
    <polygon points="400,105 430,90 400,75 370,90" fill="url(#gold-grad)" opacity="0.8" />
    
    <!-- Glowing digital shield over the core lock -->
    <polygon points="400,92 412,98 412,112 400,118 388,112 388,98" fill="none" stroke="#ffffff" stroke-width="1.2" filter="url(#glow-cyan)" />

    <!-- Satellite Cryptographic Keys / Signatures labels -->
    <text x="235" y="125" class="text-tag" fill="#00f2fe">Argon2id KDF</text>
    <text x="490" y="125" class="text-tag" fill="#00f2fe">AES-256-GCM</text>
    
    <!-- EVM Multi-chain core tag -->
    <text x="355" y="55" class="text-tag" fill="#ffffff" font-weight="bold">B2 CRYPTO CORE</text>
  </g>
</svg>
